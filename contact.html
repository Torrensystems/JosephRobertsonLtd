<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Joseph Robertson</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f5f2;
      color: #1f1f1f;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background: #fff;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    header img {
      height: 60px;
      width: auto;
      display: block;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 25px;
    }

    nav a {
      text-decoration: none;
      color: #6e1f2a;
      font-weight: bold;
      font-size: 16px;
    }

    .contact-btn {
      background: #8f1d21;
      color: #fff;
      padding: 12px 22px;
      border-radius: 999px;
      display: inline-block;
    }

    .section {
      max-width: 1100px;
      margin: auto;
      padding: 60px 30px 80px;
    }

    .form-wrap {
      background: #fff;
      padding: 40px;
      border-radius: 14px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.08);
    }

    .form-label {
      display: block;
      text-align: center;
      color: #6e1f2a;
      font-weight: bold;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
      font-size: 14px;
    }

    .form-wrap h1 {
      text-align: center;
      font-size: 58px;
      margin: 0 0 15px;
      line-height: 1.1;
    }

    .form-intro {
      text-align: center;
      font-size: 17px;
      line-height: 1.7;
      color: #333;
      margin: 0 0 35px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }

    .field-group label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      color: #1f1f1f;
      font-size: 15px;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d8d8d8;
      border-radius: 12px;
      font-size: 15px;
      font-family: Arial, sans-serif;
      box-sizing: border-box;
      background: #fff;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #8f1d21;
    }

    .submit-wrap {
      text-align: center;
      margin-top: 10px;
    }

    .submit-btn {
      background: #ff2a23;
      color: #fff;
      border: none;
      padding: 14px 30px;
      border-radius: 999px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(255, 42, 35, 0.28);
    }

    .note {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-top: 12px;
    }

    .whatsapp-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      z-index: 999;
      transition: transform 0.2s ease;
      text-decoration: none;
    }

    .whatsapp-btn:hover {
      transform: scale(1.08);
    }

    .whatsapp-btn img {
      width: 30px;
      height: 30px;
      display: block;
    }

    @media (max-width: 768px) {
      header {
        flex-direction: column;
        gap: 15px;
        padding: 15px 20px;
      }

      nav {
        gap: 14px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .section {
        padding: 40px 20px 60px;
      }

      .form-wrap {
        padding: 25px;
      }

      .form-wrap h1 {
        font-size: 40px;
      }

      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <header>
    <img src="logo-red.jpg" alt="Joseph Robertson Logo">

    <nav>
      <a href="index.html">Home</a>
      <a href="index.html#overview">Who We Are</a>
      <a href="index.html#products">Products</a>
      <a href="contact.html?source=barcelona" class="contact-btn">Contact</a>
    </nav>
  </header>

  <section class="section">
    <div class="form-wrap">
      <span class="form-label">ENQUIRIES</span>
      <h1 id="formTitle">Get in Touch</h1>
      <p class="form-intro" id="formIntro">
        Complete the form below and we’ll come back to you as soon as possible.
      </p>

      <form name="contact" method="POST" data-netlify="true" action="/">
        <input type="hidden" name="form-name" value="contact">
        <input type="hidden" name="source" id="sourceField" value="website">

        <div class="row">
          <div class="field-group">
            <label for="name">Name</label>
            <input id="name" type="text" name="name" required>
          </div>

          <div class="field-group">
            <label for="company">Company</label>
            <input id="company" type="text" name="company">
          </div>
        </div>

        <div class="row">
          <div class="field-group">
            <label for="email">Email</label>
            <input id="email" type="email" name="email" required>
          </div>

          <div class="field-group">
            <label for="phone">Phone</label>
            <input id="phone" type="tel" name="phone">
          </div>
        </div>

        <div class="row">
          <div class="field-group">
            <label for="enquiryType">Enquiry Type</label>
            <select id="enquiryType" name="enquiryType">
              <option value="General Enquiry">General Enquiry</option>
              <option value="Arrange a Meeting">Arrange a Meeting</option>
              <option value="Product Enquiry">Product Enquiry</option>
              <option value="Retail Opportunity">Retail Opportunity</option>
              <option value="Foodservice Opportunity">Foodservice Opportunity</option>
            </select>
          </div>

          <div class="field-group">
            <label for="preferredTime">Preferred Meeting Time</label>
            <input id="preferredTime" type="text" name="preferredTime" placeholder="Optional">
          </div>
        </div>

        <div class="field-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Let us know what you’d like to discuss."></textarea>
        </div>

        <div class="submit-wrap">
          <button type="submit" class="submit-btn">Send Enquiry</button>
          <p class="note">We’ll use the details you provide to respond to your enquiry.</p>
        </div>
      </form>
    </div>
  </section>

  <a href="https://wa.me/447000000000?text=Hi%20I%20would%20like%20to%20arrange%20a%20meeting%20in%20Barcelona." class="whatsapp-btn" target="_blank" rel="noopener noreferrer">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
  </a>

  <script>
    const params = new URLSearchParams(window.location.search);
    const source = params.get("source");

    if (source === "barcelona") {
      document.getElementById("formTitle").textContent = "Arrange a Meeting";
      document.getElementById("formIntro").textContent = "Complete the form below and we’ll come back to you to arrange a suitable time to meet in Barcelona.";
      document.getElementById("enquiryType").value = "Arrange a Meeting";
      document.getElementById("sourceField").value = "barcelona";
    }
  </script>

</body>
</html>
